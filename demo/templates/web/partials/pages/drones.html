<section class="page" id="drones_page">
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">Дроны</div>
    </div>
    <div class="panel-body">
      <div id="drones_list"></div>

      <h4>Добавить дрон</h4>
      <input type="text" id="new_drone_id" placeholder="ID дрона">
      <button id="add_drone_btn">Добавить дрон</button>
    </div>
  </div>

  <script>
    document.getElementById("add_drone_btn").addEventListener("click", () => {
      const id = document.getElementById("new_drone_id").value.trim();
      if (id) WebUI.drones.addDrone({ id });
    });
  </script>
</section>
